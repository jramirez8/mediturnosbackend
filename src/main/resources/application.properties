spring.application.name=mediturnosback

server.port=${SERVER_PORT:8080}
app.base-url=${APP_BASE_URL:http://192.168.0.21:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/mediturnos?createDatabaseIfNotExist=true&serverTimezone=America/Argentina/Buenos_Aires&zeroDateTimeBehavior=convertToNull&sessionVariables=sql_mode='NO_ENGINE_SUBSTITUTION'&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1112}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires
spring.jpa.open-in-view=true

# Fix for Spring Boot 3.4.x PathPatternParser strictness
# This enables the legacy AntPathMatcher which allows the ** patterns used by Swagger UI
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.main.allow-bean-definition-overriding=true

# Fix for "Unable to create tempDir" when java.io.tmpdir is restricted (e.g., C:\WINDOWS\)
server.tomcat.basedir=./build/tomcat

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# SMTP / Brevo
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Optional explicit sender; defaults to spring.mail.username
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
