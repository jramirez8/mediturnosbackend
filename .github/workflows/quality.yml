name: Calidad, coverage y Sonar

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar caché Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Habilitar Gradle Wrapper
        run: chmod +x gradlew

      - name: Tests y coverage JaCoCo
        run: ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification

      - name: Guardar reportes de tests y coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-quality-reports
          path: |
            build/reports/tests/test/**
            build/reports/jacoco/test/html/**
            build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Analizar con SonarQube Cloud
        if: ${{ success() && env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}


      - name: Verificar cero alertas High o Medium
        if: ${{ success() && env.SONAR_TOKEN != '' }}
        shell: bash
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            --get "https://sonarcloud.io/api/issues/search" \
            --data-urlencode "componentKeys=jramirez8_mediturnosbackend" \
            --data-urlencode "resolved=false" \
            --data-urlencode "impactSeverities=HIGH,MEDIUM" \
            --data-urlencode "ps=1" \
            --output sonar-high-medium.json
          TOTAL=$(python3 -c "import json; print(json.load(open('sonar-high-medium.json', encoding='utf-8')).get('total', 0))")
          echo "Alertas High/Medium abiertas: $TOTAL"
          test "$TOTAL" -eq 0
