spring.application.name=mediturnosback

server.port=${SERVER_PORT:9090}
server.address=127.0.0.1
app.base-url=${APP_BASE_URL:http://localhost:9090}

# Database - Defaulting to H2 for easy setup, override with env vars for MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:mediturnos;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Fix for Spring Boot 3.4.x PathPatternParser strictness
# This enables the legacy AntPathMatcher which allows the ** patterns used by Swagger UI
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.main.allow-bean-definition-overriding=true

# Desactivar JMX para evitar sockets adicionales que Windows bloquea
spring.jmx.enabled=false
server.tomcat.mbeanregistry.enabled=false

# Forzar el uso del protocolo HTTP/1.1 bįsico
server.http2.enabled=false


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# SMTP / Brevo
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Optional explicit sender; defaults to spring.mail.username
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
