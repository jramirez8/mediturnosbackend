spring.application.name=mediturnosback

server.port=${PORT:8080}
server.address=0.0.0.0
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Database - local usa H2 si no hay variables, Railway pisa esto con MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:mediturnos;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires
# Hibernate autodetecta el dialecto desde la conexión. No fijar H2 si Railway usa MySQL.
spring.jpa.open-in-view=true

# H2 Console
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Swagger / Spring MVC
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.main.allow-bean-definition-overriding=true

# JMX / Tomcat
spring.jmx.enabled=false
server.tomcat.mbeanregistry.enabled=false
server.http2.enabled=false

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# SMTP / Brevo
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:false}

# Optional explicit sender; defaults to spring.mail.username
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}




# JWT de producción. APP_JWT_SECRET es obligatoria y debe tener al menos 32 caracteres.
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}

# CORS para Expo Web / desarrollo local / deploys comunes
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:8082,http://localhost:19006,http://127.0.0.1:8081,http://127.0.0.1:8082,http://127.0.0.1:19006,https://mediturnos.net.ar,https://www.mediturnos.net.ar,http://mediturnos.net.ar,http://www.mediturnos.net.ar,https://mediturnosfrontend-production.up.railway.app,https://*.vercel.app,https://*.railway.app}

# Front link para reset de contraseña. El token no se expone al frontend por defecto.
app.frontend-reset-url=${APP_FRONTEND_RESET_URL:https://mediturnos.net.ar/reset-password}
app.auth.expose-reset-token=${APP_AUTH_EXPOSE_RESET_TOKEN:false}

# Brevo API HTTPS, recomendado en Railway Hobby.
# Definir en Railway como variables de entorno: BREVO_API_KEY, BREVO_SENDER_EMAIL, BREVO_SENDER_NAME.

# Uploads comprimidos. En Railway usar un Volume montado en /data para persistencia real.
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:1MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:1MB}
app.upload.dir=${APP_UPLOAD_DIR:/data/uploads}
app.upload.max-input-bytes=${APP_UPLOAD_MAX_INPUT_BYTES:1048576}
app.upload.image.max-width=${APP_UPLOAD_IMAGE_MAX_WIDTH:1280}
app.upload.image.max-height=${APP_UPLOAD_IMAGE_MAX_HEIGHT:1280}
app.upload.image.jpeg-quality=${APP_UPLOAD_IMAGE_JPEG_QUALITY:0.58}
app.upload.image.target-max-bytes=${APP_UPLOAD_IMAGE_TARGET_MAX_BYTES:350000}

# Producción Mediturnos
app.admin.email=${APP_ADMIN_EMAIL:admin@mediturnos.net.ar}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.frontend-verify-url=${APP_FRONTEND_VERIFY_URL:https://mediturnos.net.ar/registro/verificar}

# Reset controlado: poner MEDITURNOS_RESET_DB=true solo en el primer deploy para limpiar datos productivos.
mediturnos.reset-db=${MEDITURNOS_RESET_DB:false}
