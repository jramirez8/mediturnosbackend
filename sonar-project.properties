sonar.organization=jramirez8
sonar.projectKey=jramirez8_mediturnosbackend
sonar.projectName=Mediturnos Backend
sonar.sourceEncoding=UTF-8

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.test.inclusions=src/test/java/**/*.java
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Se analiza todo el código con Sonar. Solo se excluyen de coverage clases declarativas,
# infraestructura externa y orquestadores grandes que requieren pruebas de integración.
sonar.coverage.exclusions=src/main/java/**/config/**,src/main/java/**/controller/**,src/main/java/**/dto/**,src/main/java/**/exception/**,src/main/java/**/model/**,src/main/java/**/repository/**,src/main/java/**/*Application.java,src/main/java/**/service/AdminService.java,src/main/java/**/service/AuthService.java,src/main/java/**/service/FeedbackService.java,src/main/java/**/service/ListaEsperaService.java,src/main/java/**/service/MailService.java,src/main/java/**/service/MediaFileService.java,src/main/java/**/service/PacienteService.java,src/main/java/**/service/ProfesionalService.java,src/main/java/**/service/TurnoReminderScheduler.java,src/main/java/**/service/TurnoService.java,src/main/java/**/service/VerificationDispatchService.java,src/main/java/**/security/JwtAuthenticationFilter.java,src/main/java/**/util/**
sonar.exclusions=build/**,.gradle/**

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
