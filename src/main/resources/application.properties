spring.application.name=mediturnosback

server.port=8080
app.base-url=http://localhost:8080

spring.datasource.url=jdbc:mysql://localhost:3306/mediturnos?createDatabaseIfNotExist=true&serverTimezone=America/Argentina/Buenos_Aires&zeroDateTimeBehavior=convertToNull&sessionVariables=sql_mode='NO_ENGINE_SUBSTITUTION'
spring.datasource.username=root
spring.datasource.password=1112

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires
spring.jpa.open-in-view=false

# Fix for Spring Boot 3.4.x PathPatternParser strictness
# This enables the legacy AntPathMatcher which allows the ** patterns used by Swagger UI
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.main.allow-bean-definition-overriding=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
